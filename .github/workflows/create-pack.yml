name: Create Pack

on:
  push:
    paths-ignore:
      - README.md
      - .gitignore
      - .gitattributes

# Change the information to the current version of the resource pack.
# Version bumps will only occur with each release and not with unstable builds.
env:
  PROJECT_VERSION: "8.0.0"
  BUILD_TYPE: "beta" # Options: alpha, beta, release.

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Prepare names and validate build type
        run: |
          BUILD_TYPE_LOWER="$(echo "$BUILD_TYPE" | tr '[:upper:]' '[:lower:]')"
          case "$BUILD_TYPE_LOWER" in
            alpha|beta|release) FINAL_BUILD_TYPE="$BUILD_TYPE_LOWER" ;;
            *) FINAL_BUILD_TYPE="experimental" ;;
          esac

          ZIP_NAME="bedrockflavor-${PROJECT_VERSION}.zip"
          ARTIFACT_NAME="${ZIP_NAME%.zip}-${FINAL_BUILD_TYPE}"
          RELEASE_NAME="${PROJECT_VERSION}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RELEASE_DESC="Release made from the commit: ${SHORT_SHA}"

          echo "FINAL_BUILD_TYPE=$FINAL_BUILD_TYPE" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=$ARTIFACT_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
          echo "RELEASE_DESC=$RELEASE_DESC" >> $GITHUB_ENV
          echo FILES=assets overlay_* pack.mcmeta LICENSE pack.png respackopts.json5 CREDITS >> $GITHUB_ENV

      - name: Check if relevant files changed
        id: changes
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD^ HEAD)
          else
            CHANGED=$(git ls-files)
          fi

          if echo "$CHANGED" | grep -Ev "^(README\.md$|\.gitignore$|\.gitattributes$)" | grep -q .; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Minify JSON files
        if: steps.changes.outputs.should_build == 'true'
        run: |
          minify_json() {
            local file="$1"
            echo "Minified $file"
            jq -c . "$file" > "${file}.tmp" && mv "${file}.tmp" "$file"
          }

          export -f minify_json

          find $FILES \
            -type f \( -name "*.json" -o -name "*.json5" -o -name "*.mcmeta" \) -print0 \
            | xargs -0 -n1 -P$(nproc) bash -c 'minify_json "$1"' _

      - name: Build .zip and manifest.txt (Release only)
        if: ${{ env.FINAL_BUILD_TYPE == 'release' && steps.changes.outputs.should_build == 'true' }}
        run: |
          mkdir -p build
          for f in $FILES; do
            if [ ! -e "$f" ]; then
              echo "ERROR: $f not found" >&2
              exit 1
            fi
          done

          find $FILES -type f > build/manifest.txt

          zip -rq -1 -X -D "build/${ZIP_NAME}" $FILES
      - name: Compute SHA256 for release
        if: ${{ env.FINAL_BUILD_TYPE == 'release' && steps.changes.outputs.should_build == 'true' }}
        run: |
          sha256sum "build/${ZIP_NAME}" | tee "build/${ZIP_NAME}.sha256"

      - name: Upload artifact (alpha/beta only)
        if: ${{ (env.FINAL_BUILD_TYPE == 'alpha' || env.FINAL_BUILD_TYPE == 'beta') && steps.changes.outputs.should_build == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            assets/**
            overlay_*/**
            pack.mcmeta
            LICENSE
            pack.png
            respackopts.json5
            CREDITS
          retention-days: 14

      - name: Create release
        if: ${{ env.FINAL_BUILD_TYPE == 'release' && steps.changes.outputs.should_build == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ env.PROJECT_VERSION }}"
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_DESC }}
          files: |
            build/${{ env.ZIP_NAME }}
            build/${{ env.ZIP_NAME }}.sha256
            build/manifest.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}